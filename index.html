<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник питания</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>📝 Добавить запись в дневник</h1>
    
    <input type="text" id="dish" placeholder="Название блюда">
    <input type="number" id="calories" placeholder="Калории">
    <button onclick="saveEntry()">Сохранить в дневник</button>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function saveEntry() {
            const dish = document.getElementById('dish').value;
            const calories = document.getElementById('calories').value;

            if (!dish || !calories) {
                tg.showAlert('Заполни оба поля!');
                return;
            }

            // Формируем данные для отправки в Salebot
            const data = {
                action: 'add_diary_entry',
                dish: dish,
                calories: calories
            };

            // Отправляем данные в бот и закрываем Mini App
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
