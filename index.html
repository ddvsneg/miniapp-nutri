<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник питания</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        #status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        #status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <h1>📝 Добавить запись в дневник</h1>
    
    <input type="text" id="dish" placeholder="Название блюда">
    <input type="number" id="calories" placeholder="Калории">
    <button id="saveBtn" onclick="saveEntry()">Сохранить в дневник</button>
    <div id="status"></div>

    <script>
        // ⚠️ ВСТАВЬ СЮДА СВОЙ API-КЛЮЧ SALEBOT
        const SALEBOT_API_KEY = "7c49ba443459eb814396e5b139a7a0e8";

        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function saveEntry() {
            const dish = document.getElementById('dish').value;
            const calories = document.getElementById('calories').value;
            const saveBtn = document.getElementById('saveBtn');
            const status = document.getElementById('status');

            if (!dish || !calories) {
                tg.showAlert('Заполни оба поля!');
                return;
            }

            // Получаем platform_id из URL-параметра (Salebot передаёт его в ссылке)
            const urlParams = new URLSearchParams(window.location.search);
            let platformId = urlParams.get('user_id');
            
            // Резерв: пробуем получить из Telegram WebApp (на случай если открыто без параметра)
            if (!platformId) {
                platformId = tg.initDataUnsafe?.user?.id;
            }
            
            if (!platformId) {
                status.className = 'error';
                status.textContent = '❌ Не удалось получить ID пользователя. Открой Mini App через бота.';
                return;
            }

            // Блокируем кнопку на время отправки
            saveBtn.disabled = true;
            saveBtn.textContent = 'Сохраняю...';
            status.style.display = 'none';

            try {
                // Отправляем callback в Salebot
                const response = await fetch(
                    `https://chatter.salebot.pro/api/${SALEBOT_API_KEY}/callback`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client_id: platformId,
                            message: 'diary_new_entry',
                            dish: dish,
                            calories: calories
                        })
                    }
                );

                const result = await response.json();

                if (response.ok) {
                    status.className = 'success';
                    status.textContent = '✅ Запись сохранена!';
                    // Через 1.5 секунды закрываем Mini App
                    setTimeout(() => tg.close(), 1500);
                } else {
                    throw new Error(result.message || 'Ошибка отправки');
                }
            } catch (error) {
                status.className = 'error';
                status.textContent = '❌ Ошибка: ' + error.message;
                saveBtn.disabled = false;
                saveBtn.textContent = 'Сохранить в дневник';
            }
        }
    </script>
</body>
</html>
